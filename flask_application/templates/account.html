{% extends 'base.html' %}
{% block title %}Account{% endblock %}
{% block content %}

<div class="account-container">
    <div class="account-card">

        <h2 class="account-title">Account Settings</h2>

        <!-- Change Password -->
        <form method="POST" class="account-form">
            <h3>Change Password</h3>
            <input type="password" name="new_password" placeholder="New Password">
            <button type="submit">Update Password</button>
        </form>

        <!-- D2L Calendar -->
        <form method="POST" class="account-form">
            <h3>Connect D2L Calendar</h3>
            <input type="text" name="ics_url" placeholder="Paste your ICS link here" value="{{ current_user.ics_url }}">
            <button type="submit">Save Link</button>
        </form>

        <!-- Logout -->
        <a href="{{ url_for('logout') }}" class="logout-link">
            <button type="button" class="logout-btn">Log Out</button>
        </a>

    </div>
</div>

{% endblock %}
